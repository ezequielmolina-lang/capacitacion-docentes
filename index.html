<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f39300">
  <meta name="description" content="Capacitaci&oacute;n virtual para docentes del programa Eligiendo Mi Camino">
  <title>Capacitaci&oacute;n Docente &mdash; Eligiendo Mi Camino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #f39300;
      --primary-dark: #f75a00;
      --primary-light: #fdd026;
      --bg-cream: #fffbf0;
      --text-dark: #242c32;
      --text-gray: #666;
      --math-color: #C62828;
      --math-bg: #FFEBEE;
      --ov-color: #2E7D32;
      --ov-bg: #E8F5E9;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-cream);
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active {
      display: block;
      animation: slideUp 0.35s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Landing ── */
    .hero {
      background: linear-gradient(135deg, #fde3b1 0%, #fdd026 30%, #f39300 65%, #f75a00 100%);
      padding: 56px 24px 48px;
      text-align: center;
      color: #fff;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .hero p {
      font-size: 1.05rem;
      font-weight: 400;
      opacity: 0.95;
      max-width: 520px;
      margin: 0 auto;
    }

    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 20px 24px 8px;
    }
    .badge {
      background: #fff;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-gray);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      white-space: nowrap;
    }

    .tracks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 720px;
      margin: 28px auto 48px;
      padding: 0 24px;
    }

    .track-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-top: 4px solid transparent;
      display: flex;
      flex-direction: column;
    }
    .track-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }
    .track-card[data-track="math"] { border-top-color: var(--math-color); }
    .track-card[data-track="ov"]   { border-top-color: var(--ov-color); }

    .track-card .icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 14px;
    }
    .track-card[data-track="math"] .icon { background: var(--math-bg); color: var(--math-color); }
    .track-card[data-track="ov"]   .icon { background: var(--ov-bg);   color: var(--ov-color); }

    .track-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .track-card .desc { font-size: 0.85rem; color: var(--text-gray); line-height: 1.5; flex: 1; }

    .progress-bar-wrap {
      margin-top: 16px;
      background: #eee;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }
    .track-card[data-track="math"] .progress-bar-fill { background: var(--math-color); }
    .track-card[data-track="ov"]   .progress-bar-fill { background: var(--ov-color); }
    .progress-label {
      font-size: 0.75rem;
      color: var(--text-gray);
      margin-top: 6px;
    }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-gray);
      cursor: pointer;
      padding: 14px 24px;
      min-height: 44px;
      min-width: 44px;
    }
    .back-btn:hover { color: var(--text-dark); }

    /* ── Module List ── */
    .track-header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .track-header .icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .track-header h1 { font-size: 1.5rem; font-weight: 700; }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 780px;
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    .module-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .module-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .module-card .num {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .module-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .module-card .desc { font-size: 0.82rem; color: var(--text-gray); line-height: 1.45; margin-bottom: 10px; }
    .module-card .meta {
      font-size: 0.75rem;
      color: var(--text-gray);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .module-card .check {
      position: absolute;
      top: 16px; right: 16px;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      color: #fff;
    }
    .module-card .check.done { background: #4CAF50; }
    .module-card .check.pending { background: #ddd; color: #999; }

    /* ── Spacing recommendation banner ── */
    .spacing-banner {
      background: #FFF3E0;
      border: 1px solid #FFE0B2;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #E65100;
      text-align: center;
      margin: 0 auto 16px;
      max-width: 780px;
    }

    /* ── Step Viewer ── */
    .viewer-topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-link {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-gray);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--text-dark); }

    .viewer-progress {
      flex: 1;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    .viewer-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      transition: width 0.4s ease;
      border-radius: 3px;
    }
    .step-counter {
      font-size: 0.85rem;
      color: var(--text-gray);
      white-space: nowrap;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 12px;
      max-width: 800px;
      margin: 0 auto;
    }
    .step-type-badge {
      font-size: 1.5rem;
    }
    .step-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0;
    }

    .step-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 100px;
      min-height: 60vh;
    }

    /* Video step */
    .step-video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 16px;
    }
    .step-video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .step-video-caption {
      font-size: 0.9rem;
      color: var(--text-gray);
      font-style: italic;
      text-align: center;
    }

    /* Content step */
    .step-content-html {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text-dark);
    }
    .step-content-html p { margin-bottom: 16px; }
    .step-content-html ul, .step-content-html ol { margin: 12px 0; padding-left: 24px; }
    .step-content-html li { margin-bottom: 8px; }
    .step-content-html img {
      max-width: 100%;
      border-radius: 8px;
      box-shadow: var(--card-shadow);
      margin: 16px 0;
    }
    .step-content-html .callout {
      background: #FFF3E0;
      border-left: 4px solid var(--primary);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
    }
    .step-content-html .callout-info {
      background: #E3F2FD;
      border-left-color: #1565C0;
    }

    /* Quiz step */
    .quiz-intro { font-size: 1rem; color: var(--text-gray); margin-bottom: 20px; }
    .quiz-question {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .quiz-question-text {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 12px;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .quiz-option:hover { border-color: var(--primary); background: #FFF8E1; }
    .quiz-option.selected { border-color: var(--primary); background: #FFF3E0; }
    .quiz-option.correct { border-color: #2E7D32; background: #E8F5E9; }
    .quiz-option.wrong { border-color: #C62828; background: #FFEBEE; }
    .quiz-option input[type="radio"] { display: none; }
    .quiz-option .radio-dot {
      width: 20px; height: 20px;
      border: 2px solid #ccc;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }
    .quiz-option.selected .radio-dot {
      border-color: var(--primary);
    }
    .quiz-option.selected .radio-dot::after {
      content: '';
      width: 10px; height: 10px;
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
    }
    .quiz-option.correct .radio-dot { border-color: #2E7D32; }
    .quiz-option.correct .radio-dot::after { background: #2E7D32; }
    .quiz-option.wrong .radio-dot { border-color: #C62828; }
    .quiz-verify-btn {
      display: block;
      margin: 12px auto 0;
      padding: 10px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .quiz-verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .quiz-feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .quiz-feedback.correct { background: #E8F5E9; color: #1B5E20; border: 1px solid #A5D6A7; }
    .quiz-feedback.wrong { background: #FFEBEE; color: #B71C1C; border: 1px solid #EF9A9A; }

    /* Practice step */
    .practice-instructions {
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .practice-checklist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 20px 0;
    }
    .practice-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .practice-item:hover { border-color: var(--primary); }
    .practice-item.checked { border-color: #2E7D32; background: #E8F5E9; }
    .practice-checkbox {
      width: 24px; height: 24px;
      border: 2px solid #ccc;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .practice-item.checked .practice-checkbox {
      background: #2E7D32;
      border-color: #2E7D32;
      color: white;
    }

    /* Reflection step */
    .reflection-prompt {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .reflection-textarea {
      width: 100%;
      min-height: 150px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .reflection-textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .reflection-saved {
      color: #2E7D32;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    /* Step navigation */
    .step-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: white;
      border-top: 1px solid #eee;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
      z-index: 20;
    }
    .btn-step-nav {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-prev {
      background: #f5f5f5;
      color: var(--text-dark);
      border: 1px solid #ddd;
    }
    .btn-prev:hover { background: #e0e0e0; }
    .btn-next {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
    }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(243,147,0,0.3); }
    .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.78rem;
      color: var(--text-gray);
      border-top: 1px solid #eee;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero h1 { font-size: 1.7rem; }
      .hero p { font-size: 0.95rem; }
      .tracks { grid-template-columns: 1fr; max-width: 420px; }
      .module-grid { grid-template-columns: 1fr; max-width: 480px; }
      .step-content { padding: 0 16px 100px; }
      .step-header { padding: 16px 16px 8px; }
      .step-header h2 { font-size: 1.1rem; }
    }
    @media (max-width: 480px) {
      .hero { padding: 40px 16px 36px; }
      .hero h1 { font-size: 1.4rem; }
      .hero p { font-size: 0.88rem; }
      .tracks { padding: 0 16px; gap: 14px; margin: 20px auto 36px; }
      .track-card { padding: 22px 18px 20px; }
      .module-grid { padding: 0 16px; }
      .track-header { padding: 20px 16px 16px; }
    }
  </style>
</head>
<body>

  <!-- ══════════ Landing View ══════════ -->
  <div id="view-landing" class="view active">
    <div class="hero">
      <h1>Capacitaci&oacute;n Docente</h1>
      <p>Formaci&oacute;n virtual para docentes de Eligiendo Mi Camino</p>
    </div>
    <div class="badges">
      <span class="badge">DRELM</span>
      <span class="badge">Banco Mundial</span>
      <span class="badge">UPC</span>
      <span class="badge">uDocz</span>
    </div>
    <div class="tracks" id="track-cards"></div>
    <div class="footer">Eligiendo Mi Camino &mdash; Programa de Orientaci&oacute;n Vocacional</div>
  </div>

  <!-- ══════════ Module List View ══════════ -->
  <div id="view-modules" class="view">
    <button class="back-btn" onclick="navigate('landing')">
      <i class="fa-solid fa-arrow-left"></i> Volver
    </button>
    <div class="track-header" id="modules-header"></div>
    <div id="spacing-banner-container" style="padding:0 24px"></div>
    <div class="module-grid" id="module-grid"></div>
    <div class="footer">Eligiendo Mi Camino &mdash; Programa de Orientaci&oacute;n Vocacional</div>
  </div>

  <!-- ══════════ Viewer View ══════════ -->
  <div id="view-viewer" class="view">
    <!-- Top bar -->
    <div class="viewer-topbar">
      <a class="back-link" onclick="navigate('modules')"><i class="fa-solid fa-arrow-left"></i> Volver a m&oacute;dulos</a>
      <div class="viewer-progress">
        <div class="viewer-progress-bar" id="viewer-progress-bar"></div>
      </div>
      <span class="step-counter" id="step-counter">Paso 1 de 1</span>
    </div>

    <!-- Step title -->
    <div class="step-header" id="step-header">
      <span class="step-type-badge" id="step-type-badge"></span>
      <h2 id="step-title">Step Title</h2>
    </div>

    <!-- Step content area (dynamically rendered) -->
    <div class="step-content" id="step-content"></div>

    <!-- Navigation footer -->
    <div class="step-nav">
      <button class="btn-step-nav btn-prev" id="btn-prev-step" onclick="prevStep()">
        <i class="fas fa-arrow-left"></i> Anterior
      </button>
      <button class="btn-step-nav btn-next" id="btn-next-step" onclick="nextStep()">
        Siguiente <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>

<script>
/* ── Module Data ── */
const MODULES = {
  math: {
    title: "Matem\u00e1ticas",
    color: "var(--math-color)",
    bg: "var(--math-bg)",
    icon: "fa-calculator",
    guideUrl: "https://drive.google.com/file/d/12Q5zUjofNHHfONZT2nSSQVOGH8M2zuan/view",
    folderUrl: "https://drive.google.com/drive/folders/1kfWgFFFpGl9LDKlUhREi9cBjERI2BJm3",
    modules: [
      {
        id: "m1",
        title: "M\u00f3dulo 1 \u2014 Bienvenida y Contexto",
        desc: "Video de Jaime Saavedra, qu\u00e9 es el programa, qu\u00e9 es IA, 4 mitos",
        duration: "~45 min",
        steps: [
          { type: "video", title: "Bienvenida de Jaime Saavedra", driveId: "1epEU4vQEa4nxbwcHkuKG1mz8KBtSpIfe", caption: "Jaime Saavedra, Director Global de Educaci\u00f3n del Banco Mundial, presenta el programa" },
          { type: "content", title: "\u00bfQu\u00e9 es Eligiendo Mi Camino?", html: "<p>Contenido pr\u00f3ximamente...</p>" },
          { type: "quiz", title: "Verifica tu comprensi\u00f3n", intro: "Responde estas preguntas sobre lo que acabas de aprender:", questions: [
            { q: "\u00bfCu\u00e1ntas escuelas participan en el piloto?", options: ["50", "100", "200", "500"], correct: 1, feedback: { correct: "\u00a1Exacto! 100 escuelas de Lima Metropolitana.", wrong: "Son 100 escuelas. Recuerda: 100 escuelas, 6,600 estudiantes, 200 docentes." } }
          ] }
        ]
      },
      {
        id: "m2",
        title: "M\u00f3dulo 2 \u2014 La Plataforma Doc",
        desc: "Conoce al tutor IA, modo escuela vs casa, practica en la plataforma",
        duration: "~60 min",
        steps: [
          { type: "video", title: "Demo del Tutor IA de Matem\u00e1ticas", driveId: "1Je8uRcmj3mQZp_KzbHjMvPvC4SpkqdxL", caption: "Demostraci\u00f3n del tutor Doc by uDocz" },
          { type: "content", title: "Placeholder", html: "<p>Contenido pr\u00f3ximamente...</p>" }
        ]
      },
      {
        id: "m3",
        title: "M\u00f3dulo 3 \u2014 Registro, Curr\u00edculo y Dashboard",
        desc: "Registro de estudiantes, integraci\u00f3n curricular, dashboard del docente",
        duration: "~50 min",
        steps: [{ type: "content", title: "Placeholder", html: "<p>Contenido pr\u00f3ximamente...</p>" }]
      },

/* ── State ── */
const state = { view: 'landing', track: null, moduleId: null };

/* ── Progress (localStorage) ── */
function getProgress() {
  return JSON.parse(localStorage.getItem('emc-cap-progress') || '{}');
}
function markComplete(track, moduleId) {
  const p = getProgress();
  if (!p[track]) p[track] = {};
  p[track][moduleId] = true;
  localStorage.setItem('emc-cap-progress', JSON.stringify(p));
}
function isComplete(track, moduleId) {
  const p = getProgress();
  return !!(p[track] && p[track][moduleId]);
}
function countComplete(track) {
  const p = getProgress();
  if (!p[track]) return 0;
  return Object.keys(p[track]).length;
}

/* ── Navigation ── */
function navigate(view, opts = {}) {
  state.view = view;
  if (opts.track !== undefined) state.track = opts.track;
  if (opts.moduleId !== undefined) state.moduleId = opts.moduleId;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  window.scrollTo(0, 0);

  if (view === 'landing') renderLanding();
  if (view === 'modules') renderModules();
  if (view === 'viewer') renderViewer();
}

/* ── Render: Landing ── */
function renderLanding() {
  const container = document.getElementById('track-cards');
  container.innerHTML = '';
  for (const [key, track] of Object.entries(MODULES)) {
    const total = track.modules.length;
    const done = countComplete(key);
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const desc = key === 'math'
      ? '5 m\u00f3dulos \u2014 Aprende a usar el tutor IA de matem\u00e1ticas Doc en tu aula'
      : '5 m\u00f3dulos \u2014 Prep\u00e1rate para guiar a tus estudiantes con el coach vocacional IA';

    const card = document.createElement('div');
    card.className = 'track-card';
    card.dataset.track = key;
    card.onclick = () => navigate('modules', { track: key });
    card.innerHTML = `
      <div class="icon"><i class="fa-solid ${track.icon}"></i></div>
      <h2>${track.title}</h2>
      <p class="desc">${desc}</p>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} m\u00f3dulos completados</div>
    `;
    container.appendChild(card);
  }
}

/* ── Render: Module List ── */
function renderModules() {
  const track = MODULES[state.track];
  const header = document.getElementById('modules-header');
  const colorStyle = state.track === 'math' ? 'background:var(--math-bg);color:var(--math-color)' : 'background:var(--ov-bg);color:var(--ov-color)';
  header.innerHTML = `
    <div class="icon" style="${colorStyle}"><i class="fa-solid ${track.icon}"></i></div>
    <h1>${track.title}</h1>
  `;

  // Spacing banner
  document.getElementById('spacing-banner-container').innerHTML =
    '<div class="spacing-banner">\uD83D\uDCA1 Recomendamos completar 1 m\u00f3dulo por d\u00eda para mejor retenci\u00f3n</div>';

  const grid = document.getElementById('module-grid');
  grid.innerHTML = '';
  track.modules.forEach((mod, i) => {
    const done = isComplete(state.track, mod.id);
    const accentColor = state.track === 'math' ? 'var(--math-color)' : 'var(--ov-color)';
    const stepCount = mod.steps ? mod.steps.length : 0;
    const card = document.createElement('div');
    card.className = 'module-card';
    card.onclick = () => navigate('viewer', { moduleId: mod.id });
    card.innerHTML = `
      <div class="check ${done ? 'done' : 'pending'}">
        <i class="fa-solid ${done ? 'fa-check' : 'fa-minus'}"></i>
      </div>
      <div class="num" style="color:${accentColor}">M\u00f3dulo ${i + 1}</div>
      <h3>${mod.title}</h3>
      <p class="desc">${mod.desc}</p>
      <div class="meta"><i class="fa-regular fa-clock"></i> ${stepCount} pasos \u00b7 ${mod.duration}</div>
    `;
    grid.appendChild(card);
  });
}

/* ── Render: Viewer (Step-based) ── */
let currentStepIndex = 0;
let currentSteps = [];
let quizStates = {};

function renderViewer() {
  const trackData = MODULES[state.track];
  const mod = trackData.modules.find(m => m.id === state.moduleId);
  if (!mod) return;

  currentSteps = mod.steps;
  currentStepIndex = 0;
  quizStates = {};
  renderStep();
}

function renderStep() {
  const step = currentSteps[currentStepIndex];
  const total = currentSteps.length;

  // Update progress bar
  const pct = ((currentStepIndex + 1) / total) * 100;
  document.getElementById('viewer-progress-bar').style.width = pct + '%';
  document.getElementById('step-counter').textContent = 'Paso ' + (currentStepIndex + 1) + ' de ' + total;

  // Step type badge
  const badges = { video: '\uD83C\uDFAC', content: '\uD83D\uDCD6', quiz: '\uD83E\uDDE0', practice: '\uD83D\uDCBB', reflection: '\uD83D\uDCAC' };
  document.getElementById('step-type-badge').textContent = badges[step.type] || '\uD83D\uDCD6';
  document.getElementById('step-title').textContent = step.title;

  // Render content by type
  const container = document.getElementById('step-content');
  switch (step.type) {
    case 'video': container.innerHTML = renderVideoStep(step); break;
    case 'content': container.innerHTML = renderContentStep(step); break;
    case 'quiz': container.innerHTML = renderQuizStep(step, currentStepIndex); break;
    case 'practice': container.innerHTML = renderPracticeStep(step, currentStepIndex); break;
    case 'reflection': container.innerHTML = renderReflectionStep(step, currentStepIndex); break;
    default: container.innerHTML = '<p>Tipo de paso no reconocido.</p>';
  }

  // Navigation buttons
  document.getElementById('btn-prev-step').style.display = currentStepIndex === 0 ? 'none' : 'flex';
  updateNextButton();

  // Scroll to top
  window.scrollTo(0, 0);
}

function renderVideoStep(step) {
  return `
    <div class="step-video-wrapper">
      <iframe src="https://drive.google.com/file/d/${step.driveId}/preview" allow="autoplay" allowfullscreen></iframe>
    </div>
    ${step.caption ? '<p class="step-video-caption">' + step.caption + '</p>' : ''}
  `;
}

function renderContentStep(step) {
  return '<div class="step-content-html">' + step.html + '</div>';
}

function renderQuizStep(step, stepIdx) {
  if (!quizStates[stepIdx]) quizStates[stepIdx] = {};

  var html = step.intro ? '<p class="quiz-intro">' + step.intro + '</p>' : '';

  step.questions.forEach(function(q, qi) {
    var qState = quizStates[stepIdx][qi];
    html += '<div class="quiz-question" id="quiz-q-' + qi + '">';
    html += '<p class="quiz-question-text">' + (qi + 1) + '. ' + q.q + '</p>';
    html += '<div class="quiz-options">';
    q.options.forEach(function(opt, oi) {
      var cls = 'quiz-option';
      if (qState) {
        if (oi === q.correct) cls += ' correct';
        else if (oi === qState.selected && oi !== q.correct) cls += ' wrong';
      } else if (quizStates[stepIdx]['sel_' + qi] === oi) {
        cls += ' selected';
      }
      var clickHandler = qState ? '' : 'onclick="selectQuizOption(' + stepIdx + ',' + qi + ',' + oi + ')"';
      html += '<div class="' + cls + '" ' + clickHandler + '>';
      html += '<span class="radio-dot"></span>';
      html += '<span>' + opt + '</span>';
      html += '</div>';
    });
    html += '</div>';

    if (!qState) {
      var hasSel = quizStates[stepIdx]['sel_' + qi] !== undefined;
      html += '<button class="quiz-verify-btn" ' + (hasSel ? '' : 'disabled') + ' onclick="verifyQuiz(' + stepIdx + ',' + qi + ')">Verificar respuesta</button>';
    } else {
      var isCorrect = qState.selected === q.correct;
      html += '<div class="quiz-feedback ' + (isCorrect ? 'correct' : 'wrong') + '">';
      html += (isCorrect ? '\u2705 ' + q.feedback.correct : '\u274C ' + q.feedback.wrong);
      html += '</div>';
    }

    html += '</div>';
  });

  return html;
}

function selectQuizOption(stepIdx, qi, oi) {
  if (quizStates[stepIdx][qi]) return;
  quizStates[stepIdx]['sel_' + qi] = oi;
  renderStep();
}

function verifyQuiz(stepIdx, qi) {
  var selected = quizStates[stepIdx]['sel_' + qi];
  if (selected === undefined) return;
  quizStates[stepIdx][qi] = { selected: selected };
  delete quizStates[stepIdx]['sel_' + qi];
  renderStep();
  updateNextButton();
}

function renderPracticeStep(step, stepIdx) {
  if (!quizStates[stepIdx]) quizStates[stepIdx] = { checks: {} };
  var checks = quizStates[stepIdx].checks || {};

  var html = '<div class="practice-instructions">' + step.instructions + '</div>';
  html += '<div class="practice-checklist">';
  step.checklist.forEach(function(item, i) {
    var checked = checks[i] ? 'checked' : '';
    html += '<div class="practice-item ' + checked + '" onclick="togglePracticeItem(' + stepIdx + ',' + i + ')">';
    html += '<span class="practice-checkbox">' + (checks[i] ? '<i class="fas fa-check"></i>' : '') + '</span>';
    html += '<span>' + item + '</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function togglePracticeItem(stepIdx, i) {
  if (!quizStates[stepIdx]) quizStates[stepIdx] = { checks: {} };
  if (!quizStates[stepIdx].checks) quizStates[stepIdx].checks = {};
  quizStates[stepIdx].checks[i] = !quizStates[stepIdx].checks[i];
  renderStep();
  updateNextButton();
}

function renderReflectionStep(step, stepIdx) {
  var key = 'emc-reflection-' + state.track + '-' + state.moduleId + '-' + stepIdx;
  var saved = localStorage.getItem(key) || '';

  return '<p class="reflection-prompt">' + step.prompt + '</p>' +
    '<textarea class="reflection-textarea" id="reflection-text" placeholder="Escribe tu reflexi\u00f3n aqu\u00ed..." oninput="saveReflection(\'' + key + '\')">' + saved + '</textarea>' +
    (saved ? '<p class="reflection-saved"><i class="fas fa-check"></i> Guardado autom\u00e1ticamente</p>' : '');
}

function saveReflection(key) {
  var text = document.getElementById('reflection-text').value;
  localStorage.setItem(key, text);
}

function updateNextButton() {
  var btn = document.getElementById('btn-next-step');
  var step = currentSteps[currentStepIndex];

  // Last step: show "Completar modulo"
  if (currentStepIndex === currentSteps.length - 1) {
    btn.innerHTML = '<i class="fas fa-check"></i> Completar m\u00f3dulo';
    btn.onclick = function() { completeModule(); };
  } else {
    btn.innerHTML = 'Siguiente <i class="fas fa-arrow-right"></i>';
    btn.onclick = function() { nextStep(); };
  }

  // Disable next if quiz not fully answered or practice not checked
  var canProceed = true;
  if (step.type === 'quiz') {
    var qs = quizStates[currentStepIndex] || {};
    canProceed = step.questions.every(function(q, qi) { return qs[qi] !== undefined; });
  } else if (step.type === 'practice' && step.checklist) {
    var checks = (quizStates[currentStepIndex] || {}).checks || {};
    canProceed = step.checklist.every(function(_, i) { return checks[i]; });
  }
  btn.disabled = !canProceed;
}

function nextStep() {
  if (currentStepIndex < currentSteps.length - 1) {
    currentStepIndex++;
    renderStep();
  }
}

function prevStep() {
  if (currentStepIndex > 0) {
    currentStepIndex--;
    renderStep();
  }
}

function completeModule() {
  markComplete(state.track, state.moduleId);
  navigate('modules', { track: state.track });
}

/* ── Init ── */
renderLanding();
</script>
