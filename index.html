<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f39300">
  <meta name="description" content="Capacitaci&oacute;n virtual para docentes del programa Eligiendo Mi Camino">
  <title>Capacitaci&oacute;n Docente &mdash; Eligiendo Mi Camino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #f39300;
      --primary-dark: #f75a00;
      --primary-light: #fdd026;
      --bg-cream: #fffbf0;
      --text-dark: #242c32;
      --text-gray: #666;
      --math-color: #C62828;
      --math-bg: #FFEBEE;
      --ov-color: #2E7D32;
      --ov-bg: #E8F5E9;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-cream);
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active {
      display: block;
      animation: slideUp 0.35s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Landing ── */
    .hero {
      background: linear-gradient(135deg, #fde3b1 0%, #fdd026 30%, #f39300 65%, #f75a00 100%);
      padding: 56px 24px 48px;
      text-align: center;
      color: #fff;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .hero p {
      font-size: 1.05rem;
      font-weight: 400;
      opacity: 0.95;
      max-width: 520px;
      margin: 0 auto;
    }

    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 20px 24px 8px;
    }
    .badge {
      background: #fff;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-gray);
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      white-space: nowrap;
    }

    .tracks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 720px;
      margin: 28px auto 48px;
      padding: 0 24px;
    }

    .track-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-top: 4px solid transparent;
      display: flex;
      flex-direction: column;
    }
    .track-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }
    .track-card[data-track="math"] { border-top-color: var(--math-color); }
    .track-card[data-track="ov"]   { border-top-color: var(--ov-color); }

    .track-card .icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 14px;
    }
    .track-card[data-track="math"] .icon { background: var(--math-bg); color: var(--math-color); }
    .track-card[data-track="ov"]   .icon { background: var(--ov-bg);   color: var(--ov-color); }

    .track-card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .track-card .desc { font-size: 0.85rem; color: var(--text-gray); line-height: 1.5; flex: 1; }

    .progress-bar-wrap {
      margin-top: 16px;
      background: #eee;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.4s ease;
    }
    .track-card[data-track="math"] .progress-bar-fill { background: var(--math-color); }
    .track-card[data-track="ov"]   .progress-bar-fill { background: var(--ov-color); }
    .progress-label {
      font-size: 0.75rem;
      color: var(--text-gray);
      margin-top: 6px;
    }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-gray);
      cursor: pointer;
      padding: 14px 24px;
      min-height: 44px;
      min-width: 44px;
    }
    .back-btn:hover { color: var(--text-dark); }

    /* ── Module List ── */
    .track-header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .track-header .icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .track-header h1 { font-size: 1.5rem; font-weight: 700; }

    .module-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 780px;
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    .module-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .module-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .module-card .num {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .module-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .module-card .desc { font-size: 0.82rem; color: var(--text-gray); line-height: 1.45; margin-bottom: 10px; }
    .module-card .meta {
      font-size: 0.75rem;
      color: var(--text-gray);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .module-card .check {
      position: absolute;
      top: 16px; right: 16px;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      color: #fff;
    }
    .module-card .check.done { background: #4CAF50; }
    .module-card .check.pending { background: #ddd; color: #999; }

    /* ── Viewer ── */
    .viewer-title-bar {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .viewer-title-bar h1 { font-size: 1.15rem; font-weight: 700; }

    .slides-container {
      width: 100%;
      padding: 0 24px;
      margin-bottom: 24px;
    }
    .slides-container iframe {
      width: 100%;
      height: 60vh;
      border: none;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
    }

    .narration-panel {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px 16px;
    }
    .narration-panel h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .narration-block {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .narration-block summary {
      padding: 14px 20px;
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }
    .narration-block summary::-webkit-details-marker { display: none; }
    .narration-block summary::before {
      content: '\f054';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      font-size: 0.7rem;
      transition: transform 0.2s;
    }
    .narration-block[open] summary::before { transform: rotate(90deg); }
    .narration-block .content {
      padding: 0 20px 16px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-gray);
    }

    .narration-placeholder {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 32px 24px;
      text-align: center;
      color: var(--text-gray);
      font-size: 0.92rem;
    }
    .narration-placeholder i { font-size: 1.6rem; margin-bottom: 10px; display: block; color: #ccc; }

    .resources-section {
      max-width: 780px;
      margin: 0 auto;
      padding: 8px 24px 16px;
    }
    .resources-section h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .resources-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .resources-links a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary-dark);
      text-decoration: none;
      box-shadow: var(--card-shadow);
      transition: transform 0.15s;
      min-height: 44px;
    }
    .resources-links a:hover { transform: translateY(-2px); }

    .complete-btn {
      display: block;
      max-width: 780px;
      margin: 8px auto 12px;
      padding: 0 24px;
      width: 100%;
    }
    .complete-btn button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.2s, transform 0.15s;
    }
    .complete-btn button.mark {
      background: var(--primary);
      color: #fff;
    }
    .complete-btn button.mark:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .complete-btn button.done {
      background: #E8F5E9;
      color: #2E7D32;
      cursor: default;
    }

    .viewer-nav {
      display: flex;
      justify-content: space-between;
      max-width: 780px;
      margin: 0 auto 48px;
      padding: 8px 24px;
      gap: 12px;
    }
    .viewer-nav button {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius);
      background: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      min-height: 44px;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .viewer-nav button:hover { border-color: var(--primary); transform: translateY(-1px); }
    .viewer-nav button:disabled { opacity: 0.35; cursor: default; transform: none; border-color: #e0e0e0; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 0.78rem;
      color: var(--text-gray);
      border-top: 1px solid #eee;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero h1 { font-size: 1.7rem; }
      .hero p { font-size: 0.95rem; }
      .tracks { grid-template-columns: 1fr; max-width: 420px; }
      .module-grid { grid-template-columns: 1fr; max-width: 480px; }
      .slides-container iframe { height: 50vh; }
    }
    @media (max-width: 480px) {
      .hero { padding: 40px 16px 36px; }
      .hero h1 { font-size: 1.4rem; }
      .hero p { font-size: 0.88rem; }
      .tracks { padding: 0 16px; gap: 14px; margin: 20px auto 36px; }
      .track-card { padding: 22px 18px 20px; }
      .module-grid { padding: 0 16px; }
      .narration-panel, .resources-section, .complete-btn, .viewer-nav { padding-left: 16px; padding-right: 16px; }
      .slides-container { padding: 0 16px; }
      .slides-container iframe { height: 42vh; }
      .viewer-title-bar { padding: 14px 16px; }
      .track-header { padding: 20px 16px 16px; }
    }
  </style>
</head>
<body>

  <!-- ══════════ Landing View ══════════ -->
  <div id="view-landing" class="view active">
    <div class="hero">
      <h1>Capacitaci&oacute;n Docente</h1>
      <p>Formaci&oacute;n virtual para docentes de Eligiendo Mi Camino</p>
    </div>
    <div class="badges">
      <span class="badge">DRELM</span>
      <span class="badge">Banco Mundial</span>
      <span class="badge">UPC</span>
      <span class="badge">uDocz</span>
    </div>
    <div class="tracks" id="track-cards"></div>
    <div class="footer">Eligiendo Mi Camino &mdash; Programa de Orientaci&oacute;n Vocacional</div>
  </div>

  <!-- ══════════ Module List View ══════════ -->
  <div id="view-modules" class="view">
    <button class="back-btn" onclick="navigate('landing')">
      <i class="fa-solid fa-arrow-left"></i> Volver
    </button>
    <div class="track-header" id="modules-header"></div>
    <div class="module-grid" id="module-grid"></div>
    <div class="footer">Eligiendo Mi Camino &mdash; Programa de Orientaci&oacute;n Vocacional</div>
  </div>

  <!-- ══════════ Viewer View ══════════ -->
  <div id="view-viewer" class="view">
    <button class="back-btn" id="viewer-back-btn">
      <i class="fa-solid fa-arrow-left"></i> Volver a m&oacute;dulos
    </button>
    <div class="viewer-title-bar" id="viewer-title"></div>
    <div class="slides-container" id="slides-container"></div>
    <div class="narration-panel" id="narration-panel"></div>
    <div class="resources-section" id="resources-section"></div>
    <div class="complete-btn" id="complete-btn-wrap"></div>
    <div class="viewer-nav" id="viewer-nav"></div>
    <div class="footer">Eligiendo Mi Camino &mdash; Programa de Orientaci&oacute;n Vocacional</div>
  </div>

<script>
/* ── Module Data ── */
const MODULES = {
  math: {
    title: "Matem\u00e1ticas",
    color: "var(--math-color)",
    bg: "var(--math-bg)",
    icon: "fa-calculator",
    guideUrl: "https://drive.google.com/file/d/12Q5zUjofNHHfONZT2nSSQVOGH8M2zuan/view?usp=sharing",
    folderUrl: "https://drive.google.com/drive/folders/1kfWgFFFpGl9LDKlUhREi9cBjERI2BJm3",
    slidesFolder: "https://drive.google.com/drive/folders/1h_I1p-dcWMnMM8__eAFuV_vjkNkMEkO-",
    modules: [
      { id: "dia1", title: "D\u00eda 1 \u2014 Bienvenida, Plataforma y Curr\u00edculo", desc: "IA, plataforma Doc, registro, integraci\u00f3n curricular y dashboard", duration: "~90 min", embedId: "1V_ID56Czrnv0XfMCQTO8rutsnJ4Fb4-ePGe7GYoDuOU", blocks: [
          {
            title: "Bloque 1 — Bienvenida, contexto y alfabetización en IA (Diapositivas 1–10)",
            slideRange: "1-10",
            content: `
              <p><strong>¡Bienvenido/a al programa Eligiendo Mi Camino!</strong> Antes de meternos de lleno, quiero que sepas con quién estamos en esto. Este programa es una alianza entre tres actores: la <strong>DRELM</strong> (tu autoridad educativa), el <strong>Banco Mundial</strong> y la <strong>UPC</strong>. Juntos hemos diseñado algo ambicioso: llevar tutoría con inteligencia artificial a cerca de <strong>100 colegios, más de 6,600 estudiantes y unos 200 docentes</strong> durante 16 semanas, con 2 horas semanales de laboratorio. Tú eres pieza clave de todo esto.</p>
              <p>Ahora, hablemos de IA. Fíjate en las diapositivas 4 y 5: un modelo de lenguaje es básicamente un sistema que <strong>predice la siguiente palabra</strong> más probable en un texto. No piensa, no siente, no tiene conciencia. Es una herramienta muy potente, pero una herramienta al fin.</p>
              <p>Hay <strong>4 mitos</strong> que necesitamos desarmar ahora mismo:</p>
              <ul>
                <li><strong>Mito 1: "La IA va a reemplazar al docente."</strong> Falso. La IA automatiza la práctica repetitiva; tú construyes comprensión, motivación y vínculo humano.</li>
                <li><strong>Mito 2: "La IA siempre da respuestas correctas."</strong> Falso. Puede "alucinar" — inventar datos que suenan convincentes pero son incorrectos.</li>
                <li><strong>Mito 3: "Los estudiantes necesitan saber programar."</strong> Falso. Usan una interfaz de chat, igual que WhatsApp.</li>
                <li><strong>Mito 4: "Solo profes tecnológicos pueden hacer esto."</strong> Falso. Si usas WhatsApp, puedes usar esta plataforma.</li>
              </ul>
              <p><strong>🎯 Actividad:</strong> Abre <em>ChatGPT</em>, <em>Claude</em> o <em>Copilot</em> en tu celular o computadora. Hazle una pregunta de matemáticas de 5.° de secundaria y evalúa la respuesta: ¿fue correcta? ¿Fue clara? ¿Un estudiante la entendería? Anota tus observaciones.</p>
            `
          },
          {
            title: "Bloque 2 — Conociendo la plataforma como estudiante (Diapositivas 11–22)",
            slideRange: "11-22",
            content: `
              <p>Ahora viene lo bueno: vas a conocer a <strong>Doc</strong>, el tutor de matemáticas con IA desarrollado por uDocz y potenciado por Claude de Anthropic. Fíjate en la diapositiva 11 — Doc no le da la respuesta al estudiante de frente. Usa el <strong>método socrático con andamiaje progresivo</strong>: primero una pista sutil, luego una pista más directa, y solo al final una explicación completa. Esto es clave porque queremos que el estudiante <em>piense</em>, no que copie.</p>
              <p>La plataforma tiene más de <strong>4,000 preguntas diagnósticas</strong>. Cada respuesta incorrecta está mapeada a un <strong>error conceptual específico</strong>. Es decir, cuando un estudiante se equivoca, Doc sabe <em>exactamente por qué</em> se equivocó y le hace una pregunta de remediación. Eso es poder diagnóstico real.</p>
              <p>Hay dos modos que debes conocer bien:</p>
              <ul>
                <li><strong>Modo Escuela (Modelo B):</strong> Es el modo estructurado para las sesiones de laboratorio. El sistema controla la secuencia. Siempre abre con una <em>"Apertura de recuperación"</em> — práctica de repaso de la sesión anterior. Como puedes ver en la diapositiva 16, el flujo es guiado paso a paso.</li>
                <li><strong>Modo Casa (Modelo A):</strong> Tiene 4 opciones libres para que el estudiante explore desde casa — <em>Aprender un tema</em>, <em>Resolver un problema</em>, <em>Ponte a prueba</em> y <em>Preguntar</em>.</li>
              </ul>
              <p>Fíjate en cómo Doc muestra el "Error conceptual" cuando respondes mal (diapositiva 19). Esa es la joya de la plataforma: no solo dice "incorrecto", sino que identifica la confusión exacta.</p>
              <p><strong>🎯 Actividad:</strong> Inicia sesión con las cuentas de prueba que te hemos proporcionado. Resuelve problemas como si fueras estudiante y — esto es importante — <strong>equivócate a propósito</strong> para ver cómo responde Doc. Observa las pistas, el andamiaje y los errores conceptuales que identifica.</p>
            `
          },
          {
            title: "Bloque 3 — Registro de estudiantes y logística (Diapositivas 23–28)",
            slideRange: "23-28",
            content: `
              <p>Muy bien, ahora pasemos a la parte operativa. Para que tus estudiantes puedan usar la plataforma, primero necesitamos <strong>registrarlos</strong>. Revisa la diapositiva 23: el formato que debes enviar incluye <strong>DNI, nombres completos y sección</strong> de cada estudiante. Es fundamental que respetes la fecha límite de entrega — sin lista, no hay cuentas.</p>
              <p>Una vez que enviamos la lista, se hace una <strong>activación masiva de cuentas</strong>. El sistema crea las cuentas automáticamente: el <strong>DNI es el nombre de usuario y también la contraseña inicial</strong>. Así de sencillo.</p>
              <p>Ahora, el <strong>protocolo de contraseñas</strong> es importante. Sigue este flujo:</p>
              <ul>
                <li><strong>Paso 1:</strong> Distribuyes las credenciales iniciales (DNI/DNI) a cada estudiante.</li>
                <li><strong>Paso 2:</strong> El estudiante cambia su contraseña en el primer ingreso.</li>
                <li><strong>Paso 3:</strong> Si un estudiante olvida su contraseña, tú puedes solicitar un restablecimiento.</li>
                <li><strong>Paso 4:</strong> Si el problema persiste, escala al coordinador del programa.</li>
              </ul>
              <p>Antes del lanzamiento oficial, te pido un favor enorme: <strong>haz una sesión de prueba</strong>. Verifica que todos los accesos funcionen. No quieres descubrir problemas técnicos el día de la primera sesión real con estudiantes.</p>
              <p><strong>✅ Checklist de verificación pre-lanzamiento:</strong></p>
              <ul>
                <li>Computadoras del laboratorio funcionan correctamente</li>
                <li>Conexión a internet estable</li>
                <li>Navegador actualizado (Chrome recomendado)</li>
                <li>Todas las cuentas de estudiantes activas y probadas</li>
                <li>Tu acceso al dashboard de docente confirmado</li>
              </ul>
              <p><strong>🎯 Actividad:</strong> Revisa la lista de tu sección y confirma que tienes los datos completos de cada estudiante. Si te falta algún DNI, este es el momento de gestionarlo.</p>
            `
          },
          {
            title: "Bloque 4 — Integración curricular (Diapositivas 29–31)",
            slideRange: "29-31",
            content: `
              <p>Esta parte es crucial porque conecta la plataforma con <strong>tu planificación de aula real</strong>. Dependiendo de cuántas horas semanales de matemáticas tiene tu colegio, la integración cambia:</p>
              <ul>

/* ── State ── */
const state = { view: 'landing', track: null, moduleId: null };

/* ── Progress (localStorage) ── */
function getProgress() {
  return JSON.parse(localStorage.getItem('emc-cap-progress') || '{}');
}
function markComplete(track, moduleId) {
  const p = getProgress();
  if (!p[track]) p[track] = {};
  p[track][moduleId] = true;
  localStorage.setItem('emc-cap-progress', JSON.stringify(p));
}
function isComplete(track, moduleId) {
  const p = getProgress();
  return !!(p[track] && p[track][moduleId]);
}
function countComplete(track) {
  const p = getProgress();
  if (!p[track]) return 0;
  return Object.keys(p[track]).length;
}

/* ── Navigation ── */
function navigate(view, opts = {}) {
  state.view = view;
  if (opts.track !== undefined) state.track = opts.track;
  if (opts.moduleId !== undefined) state.moduleId = opts.moduleId;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  window.scrollTo(0, 0);

  if (view === 'landing') renderLanding();
  if (view === 'modules') renderModules();
  if (view === 'viewer') renderViewer();
}

/* ── Render: Landing ── */
function renderLanding() {
  const container = document.getElementById('track-cards');
  container.innerHTML = '';
  for (const [key, track] of Object.entries(MODULES)) {
    const total = track.modules.length;
    const done = countComplete(key);
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const desc = key === 'math'
      ? 'D\u00eda 1 y D\u00eda 2 de formaci\u00f3n \u2014 Aprende a usar el tutor IA de matem\u00e1ticas Doc en tu aula'
      : '6 m\u00f3dulos \u2014 Prep\u00e1rate para guiar a tus estudiantes con el coach vocacional IA';

    const card = document.createElement('div');
    card.className = 'track-card';
    card.dataset.track = key;
    card.onclick = () => navigate('modules', { track: key });
    card.innerHTML = `
      <div class="icon"><i class="fa-solid ${track.icon}"></i></div>
      <h2>${track.title}</h2>
      <p class="desc">${desc}</p>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} m\u00f3dulos completados</div>
    `;
    container.appendChild(card);
  }
}

/* ── Render: Module List ── */
function renderModules() {
  const track = MODULES[state.track];
  const header = document.getElementById('modules-header');
  const colorStyle = state.track === 'math' ? 'background:var(--math-bg);color:var(--math-color)' : 'background:var(--ov-bg);color:var(--ov-color)';
  header.innerHTML = `
    <div class="icon" style="${colorStyle}"><i class="fa-solid ${track.icon}"></i></div>
    <h1>${track.title}</h1>
  `;

  const grid = document.getElementById('module-grid');
  grid.innerHTML = '';
  track.modules.forEach((mod, i) => {
    const done = isComplete(state.track, mod.id);
    const accentColor = state.track === 'math' ? 'var(--math-color)' : 'var(--ov-color)';
    const card = document.createElement('div');
    card.className = 'module-card';
    card.onclick = () => navigate('viewer', { moduleId: mod.id });
    card.innerHTML = `
      <div class="check ${done ? 'done' : 'pending'}">
        <i class="fa-solid ${done ? 'fa-check' : 'fa-minus'}"></i>
      </div>
      <div class="num" style="color:${accentColor}">${state.track === 'math' ? 'D\u00eda ' + (i + 1) : 'M\u00f3dulo ' + (i + 1)}</div>
      <h3>${mod.title}</h3>
      <p class="desc">${mod.desc}</p>
      <div class="meta"><i class="fa-regular fa-clock"></i> ${mod.duration}</div>
    `;
    grid.appendChild(card);
  });
}

/* ── Render: Viewer ── */
function renderViewer() {
  const track = MODULES[state.track];
  const modIndex = track.modules.findIndex(m => m.id === state.moduleId);
  const mod = track.modules[modIndex];
  if (!mod) return;

  const accentColor = state.track === 'math' ? 'var(--math-color)' : 'var(--ov-color)';

  // Back button
  document.getElementById('viewer-back-btn').onclick = () => navigate('modules', { track: state.track });

  // Title
  document.getElementById('viewer-title').innerHTML = `
    <div style="width:6px;height:28px;border-radius:3px;background:${accentColor}"></div>
    <h1>${mod.title}</h1>
  `;

  // Slides
  document.getElementById('slides-container').innerHTML = `
    <iframe src="https://docs.google.com/presentation/d/${mod.embedId}/embed?start=false&loop=false&delayms=60000" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
  `;

  // Narration
  const narPanel = document.getElementById('narration-panel');
  if (mod.blocks && mod.blocks.length > 0) {
    narPanel.innerHTML = `<h2><i class="fa-solid fa-headphones" style="color:${accentColor}"></i> Narraci\u00f3n</h2>`;
    mod.blocks.forEach(block => {
      const details = document.createElement('details');
      details.className = 'narration-block';
      details.setAttribute('data-audio-slot', block.audioSlot || '');
      details.innerHTML = `<summary>${block.title}</summary><div class="content">${block.content}</div>`;
      narPanel.appendChild(details);
    });
  } else {
    narPanel.innerHTML = `
      <h2><i class="fa-solid fa-headphones" style="color:${accentColor}"></i> Narraci\u00f3n</h2>
      <div class="narration-placeholder">
        <i class="fa-solid fa-microphone-slash"></i>
        Narraci\u00f3n pr\u00f3ximamente
      </div>
    `;
  }

  // Resources
  document.getElementById('resources-section').innerHTML = `
    <h2><i class="fa-solid fa-link" style="color:${accentColor}"></i> Recursos</h2>
    <div class="resources-links">
      <a href="${track.guideUrl}" target="_blank"><i class="fa-solid fa-file-pdf"></i> Gu\u00eda del tutor</a>
      <a href="${track.slidesFolder}" target="_blank"><i class="fa-solid fa-images"></i> Diapositivas</a>
      <a href="${track.folderUrl}" target="_blank"><i class="fa-solid fa-folder-open"></i> Carpeta de recursos</a>
    </div>
  `;

  // Complete button
  const done = isComplete(state.track, mod.id);
  const wrap = document.getElementById('complete-btn-wrap');
  if (done) {
    wrap.innerHTML = `<button class="done"><i class="fa-solid fa-circle-check"></i>&ensp;M\u00f3dulo completado</button>`;
  } else {
    wrap.innerHTML = `<button class="mark" id="mark-complete-btn">\u2705 Marcar como completado</button>`;
    document.getElementById('mark-complete-btn').onclick = () => {
      markComplete(state.track, mod.id);
      renderViewer();
    };
  }

  // Prev / Next
  const nav = document.getElementById('viewer-nav');
  const prevMod = track.modules[modIndex - 1];
  const nextMod = track.modules[modIndex + 1];
  nav.innerHTML = `
    <button ${!prevMod ? 'disabled' : ''} onclick="${prevMod ? `navigate('viewer',{moduleId:'${prevMod.id}'})` : ''}">
      <i class="fa-solid fa-arrow-left"></i> Anterior
    </button>
    <button ${!nextMod ? 'disabled' : ''} onclick="${nextMod ? `navigate('viewer',{moduleId:'${nextMod.id}'})` : ''}">
      Siguiente <i class="fa-solid fa-arrow-right"></i>
    </button>
  `;
}

/* ── Init ── */
renderLanding();
</script>
