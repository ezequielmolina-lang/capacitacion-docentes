<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Diploma</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Montserrat',sans-serif; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.diploma-card { background:white; border-radius:16px; max-width:700px; width:100%; padding:48px; text-align:center; }
</style>
</head>
<body>
<div class="diploma-card">
  <img src="img/math.png" alt="EMC" style="width:80px;height:80px;object-fit:contain;margin:0 auto">
  <h1 style="color:#f39300;font-size:2rem;margin:16px 0 4px">¡Felicitaciones!</h1>
  <p style="color:#666;font-size:1.1rem;margin-bottom:24px">Has completado la capacitación docente</p>
  <div style="border:3px solid #f39300;border-radius:12px;padding:32px;margin:20px 0">
    <p style="font-size:0.85rem;color:#999;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">CERTIFICADO DE FINALIZACIÓN</p>
    <h2 style="font-size:1.5rem;margin:8px 0">Matemáticas — Tutor IA</h2>
    <p style="font-size:1.2rem;margin:16px 0;color:#242c32">Otorgado a</p>
    <h2 style="font-size:1.8rem;color:#f39300;margin:8px 0">Carolina Lopez</h2>
    <p style="color:#666;margin:16px 0">IE Mercedes</p>
    <p style="font-size:0.9rem;color:#999">25 de marzo de 2026</p>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:24px;flex-wrap:wrap">
      <span style="font-size:0.8rem;color:#666">DRELM</span>
      <span style="font-size:0.8rem;color:#666">Banco Mundial</span>
      <span style="font-size:0.8rem;color:#666">UPC</span>
      <span style="font-size:0.8rem;color:#666">Eligiendo Mi Camino</span>
    </div>
  </div>
  <button onclick="window.print()" style="padding:12px 32px;background:linear-gradient(135deg,#f39300,#f75a00);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit">
    Descargar / Imprimir diploma
  </button>
</div>
</body>
</html>
